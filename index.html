<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Verification</title>

<!-- Google Font (close match) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #fff;
        color: #222;
    }

    /* Header */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 152px;
        background: #fff;
        border-bottom: 1px solid #e5e5e5;
    }

    .logo {
    display: flex;
    align-items: center;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.5px;
    }

    .logo-img {
    width: 49px;        /* adjust size */
    height: 13px;
    margin-right: 5px;  /* space between logo and text */
    }

    .login {
        font-size: 14px;
        color: #444;
        cursor: pointer;
    }

    /* Main Content */
    .container {
        text-align: center;
        margin-top: 98px;
    }

    h1 {
        font-size: 52px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }

    .details {
        font-size: 14px;
        line-height: 3;
        color: #444;
    }

    .details span {
        font-weight: 500;
        color: #222;
        margin-right: 6px;
    }

    /* Valid Message */
    .valid {
        margin-top: 15px;
        font-size: 14px;
        color: #333;
    }

    .check-img {
    width: 19px;      /* adjust size */
    height: 20px;
    margin-right: 2px;
    vertical-align: middle;
    }

    .valid b {
        color: #006400;
        font-weight: 600;
    }

    /* Footer */
    .footer {
        position: absolute;
        bottom: 25px;
        right: 50px;
        font-size: 14px;
        color: #888;
    }
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="logo">
    <img src="https://uploads.onecompiler.io/44ju5zhtk/44ju3yyda/logo.png" alt="logo" class="logo-img"></div>
    <div class="login">Login</div>
</div>

<!-- Main -->
<div class="container">
    <h1>Certificate Verification</h1>

    <div class="details">
        <div><span>Certificate ID:</span>6vhu1bl9k</div>
        <div><span>Student Name:</span>Muppana Bhindu</div>
        <div><span>Course Name:</span>Data Science</div>
        <div><span>Issue Date:</span>2026-03-31</div>
    </div>

    <div class="valid">
        <img src="https://uploads.onecompiler.io/44ju5zhtk/44ju3yyda/icons8.png" alt="valid" class="check-img">
        This certificate is <b>valid</b>.
    </div>
</div>

<!-- Footer -->
<div class="footer">
    SkillDzire Technologies Private Limited
</div>

</body>
</html>
